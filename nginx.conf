server {
    # 监听80端口
    listen 80;
    # 设置服务器名称
    server_name localhost;
    # 设置网站根目录
    root /usr/share/nginx/html;
    # 设置默认首页文件
    index index.html;
    
    # 配置前端路由，确保所有请求都返回index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # 代理API请求到后端服务器
    location /api/ {
         proxy_pass http://backend:8080/; # 将请求转发到后端服务器的地址
         proxy_set_header Host $host;      # 设置请求头中的Host为当前请求的主机名
         proxy_set_header X-Real-IP $remote_addr; # 设置请求头中的X-Real-IP为客户端的真实IP地址
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 设置请求头中的X-Forwarded-For为客户端的真实IP地址
         proxy_set_header X-Forwarded-Proto $scheme; # 设置请求头中的X-Forwarded-Proto为当前请求的协议（http或https）
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}